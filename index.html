<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>わたしのレシピ帳</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Bebas+Neue&family=Space+Grotesk:wght@700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #c8b4f0;
    --lavender-light: #e8dcff;
    --lavender-pale: #f3eeff;
    --green: #3dce82;
    --green-dark: #1fa85e;
    --yellow: #FFFF00;
    --ink: #0f0f0f;
    --white: #ffffff;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Kaku Gothic New', sans-serif; background: var(--lavender-light); color: var(--ink); min-height: 100vh; max-width: 430px; margin: 0 auto; }
  .app-header { background: var(--green); border-bottom: 3px solid var(--ink); position: sticky; top: 0; z-index: 100; overflow: hidden; }
  .header-grid { display: grid; grid-template-columns: 1fr auto; border-bottom: 2px solid var(--ink); }
  .header-title-block { padding: 12px 16px 10px; }
  .app-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(0,0,0,0.5); margin-bottom: 2px; }
  .app-title-main { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; line-height: 0.95; color: var(--ink); letter-spacing: 0.01em; }
  .header-add-block { display: flex; align-items: center; justify-content: center; padding: 0 16px; background: var(--yellow); border-left: 2px solid var(--ink); }
  .add-btn { background: none; border: none; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; color: var(--ink); cursor: pointer; line-height: 1; letter-spacing: 0.05em; padding: 0; display: flex; align-items: center; gap: 4px; }
  .add-btn:active { opacity: 0.7; }
  .search-block { padding: 8px 12px; display: flex; }
  .search-input { flex: 1; background: rgba(255,255,255,0.35); border: 2px solid var(--ink); border-radius: 0; padding: 8px 14px; color: var(--ink); font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12px; outline: none; font-weight: 700; }
  .search-input::placeholder { color: rgba(0,0,0,0.4); }
  .search-input:focus { background: rgba(255,255,255,0.6); }
  .tag-scroll { overflow-x: auto; padding: 8px 12px; display: flex; gap: 6px; scrollbar-width: none; background: var(--lavender); border-bottom: 2px solid var(--ink); align-items: center; }
  .tag-scroll::-webkit-scrollbar { display: none; }
  .tag-add-btn { flex-shrink: 0; width: 28px; height: 28px; border: 2px solid var(--ink); background: var(--yellow); color: var(--ink); font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .tag-chip { flex-shrink: 0; padding: 4px 12px; border-radius: 0; font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid var(--ink); background: var(--white); color: var(--ink); transition: all 0.1s; letter-spacing: 0.06em; font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-transform: uppercase; }
  .tag-chip.active { background: var(--ink); color: var(--yellow); }
  .recipe-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .drag-handle { position: absolute; top: 0; right: 0; width: 36px; height: 100%; display: flex; align-items: center; justify-content: center; cursor: grab; color: rgba(0,0,0,0.2); font-size: 16px; user-select: none; -webkit-user-select: none; }
  .drag-handle:active { cursor: grabbing; }
  .recipe-card { position: relative; padding-right: 32px; }
  .recipe-card.dragging { opacity: 0.4; box-shadow: none; transform: scale(0.98); }
  .recipe-card.drag-over { border-color: var(--green); box-shadow: 4px 4px 0 var(--green); }
  .recipe-card { background: var(--white); border: 2.5px solid var(--ink); border-radius: 0; overflow: hidden; cursor: pointer; transition: transform 0.08s, box-shadow 0.08s; box-shadow: 4px 4px 0 var(--ink); }
  .recipe-card:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--ink); }
  .card-accent-bar { height: 5px; }
  .card-body { padding: 10px 12px; display: flex; gap: 10px; align-items: flex-start; }
  .card-thumb { width: 66px; height: 66px; flex-shrink: 0; background: var(--lavender-light); display: flex; align-items: center; justify-content: center; font-size: 26px; border: 2px solid var(--ink); border-radius: 0; overflow: hidden; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .card-meta { padding: 6px 12px 8px; display: flex; gap: 12px; font-size: 10px; color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-weight: 700; border-top: 1px solid var(--lavender-light); }
  .meta-item { display: flex; align-items: center; gap: 3px; }
  .bottom-nav { display: none; }
  .spacer { height: 20px; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px; cursor: pointer; font-size: 9px; color: rgba(0,0,0,0.45); font-weight: 700; letter-spacing: 0.1em; transition: color 0.1s; font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-transform: uppercase; }

  .modal-body { padding: 16px; }
  .form-group { margin-bottom: 16px; }

  .form-input, .form-textarea, .form-select { width: 100%; border: 2px solid var(--ink); border-radius: 0; padding: 10px 12px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 15px; background: var(--white); color: var(--ink); outline: none; }
  .form-input:focus, .form-textarea:focus { background: var(--lavender-light); }
  .form-textarea { min-height: 100px; resize: vertical; line-height: 1.7; }
  .url-extractor { background: var(--green); border: 2px solid var(--ink); padding: 12px; margin-bottom: 16px; }
  .url-extractor-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  .url-row { display: flex; gap: 0; }
  .url-input { flex: 1; border: 2px solid var(--ink); border-right: none; border-radius: 0; padding: 9px 12px; font-size: 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; outline: none; background: var(--white); }
  .url-input:focus { background: var(--lavender-light); }
  .extract-btn { background: var(--yellow); color: var(--ink); border: 2px solid var(--ink); border-radius: 0; padding: 9px 14px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.05em; }
  .extract-btn:disabled { opacity: 0.5; }
  .extract-status { margin-top: 8px; font-family: 'Caveat', cursive; font-size: 15px; color: rgba(0,0,0,0.6); }
  .extract-status.success { color: var(--green-dark); }
  .extract-status.error { color: #c00; }
  .ingredient-list { display: flex; flex-direction: column; gap: 5px; }
  .ingredient-row { display: flex; gap: 0; align-items: center; }

  .ingr-name:focus { background: var(--lavender-light); }
  .ingr-amount { width: 90px; border: 2px solid var(--ink); border-radius: 0; padding: 8px 10px; font-size: 13px; font-family: 'Space Mono', monospace; outline: none; background: var(--lavender-light); text-align: right; }
  .ingr-amount:focus { background: var(--lavender); }
  .del-btn { background: none; border: none; font-size: 18px; color: var(--muted); cursor: pointer; padding: 4px 6px; flex-shrink: 0; }
  .add-row-btn { background: none; border: 2px dashed var(--ink); border-radius: 0; padding: 8px; width: 100%; font-size: 11px; color: var(--muted); cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin-top: 4px; letter-spacing: 0.05em; transition: background 0.1s; }
  .add-row-btn:hover { background: var(--lavender-light); color: var(--ink); }
  .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 5px; border: 2px solid var(--ink); padding: 8px; background: white; min-height: 44px; }
  .tag-badge { display: flex; align-items: center; gap: 4px; background: var(--lavender); color: var(--ink); padding: 3px 8px 3px 10px; border-radius: 0; font-size: 11px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; font-weight: 700; border: 1.5px solid var(--ink); text-transform: uppercase; letter-spacing: 0.04em; }

  .tag-input-field { border: none; outline: none; font-size: 13px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; min-width: 80px; flex: 1; background: transparent; }
  .photo-upload { border: 2px dashed var(--ink); padding: 20px; text-align: center; cursor: pointer; transition: background 0.1s; position: relative; background: var(--lavender-light); }
  .photo-upload:hover { background: var(--lavender); }
  .photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload-icon { font-size: 28px; margin-bottom: 6px; }
  .photo-upload-text { font-size: 11px; color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .photo-preview { max-width: 100%; margin-top: 10px; display: none; border: 2px solid var(--ink); }
  .save-btn { width: 100%; background: var(--green); color: var(--ink); border: 2.5px solid var(--ink); border-radius: 0; padding: 15px; font-size: 18px; font-weight: 400; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.12em; transition: transform 0.08s, box-shadow 0.08s; margin-top: 8px; box-shadow: 4px 4px 0 var(--ink); }
  .save-btn:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--ink); }
  .detail-modal .modal-body { padding: 0; }
  .detail-hero { width: 100%; height: 200px; object-fit: cover; display: block; }
  .detail-hero-placeholder { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 60px; background: var(--lavender); border-bottom: 2px solid var(--ink); position: relative; }
  .detail-content { padding: 16px; }
  .detail-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 30px; line-height: 1.05; margin-bottom: 6px; letter-spacing: 0.04em; }
  .detail-source { font-size: 10px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  .detail-source a { color: var(--green-dark); text-decoration: none; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
  .detail-section-title { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink); margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid var(--ink); font-family: 'Space Grotesk', sans-serif; font-weight: 700; opacity: 0.5; }
  .detail-section { margin-bottom: 20px; }
  .ingr-table { width: 100%; border-collapse: collapse; }
  .ingr-table tr { border-bottom: 1px solid var(--lavender); }
  .ingr-table tr td { padding: 8px 0; font-size: 14px; }

  .ingr-table tr td:last-child { color: var(--muted); text-align: right; font-size: 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  .step-list { display: flex; flex-direction: column; gap: 10px; }
  .step-item { display: flex; gap: 12px; align-items: flex-start; }
  .step-num { width: 28px; height: 28px; background: var(--green); color: var(--ink); font-size: 14px; font-weight: 400; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Space Grotesk', sans-serif; font-weight: 700; border: 2px solid var(--ink); letter-spacing: 0.02em; }
  .step-text { font-size: 14px; line-height: 1.75; padding-top: 3px; }
  .detail-memo { background: var(--yellow); padding: 12px 14px; font-family: 'Caveat', cursive; font-size: 18px; line-height: 1.65; color: var(--ink); border: 2px solid var(--ink); }
  .detail-actions { display: flex; gap: 0; margin-bottom: 28px; border: 2px solid var(--ink); }
  .action-btn { flex: 1; border: none; border-right: 2px solid var(--ink); background: var(--white); padding: 12px 4px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background 0.1s; letter-spacing: 0.04em; text-transform: uppercase; }
  .action-btn:last-child { border-right: none; }
  .action-btn.danger { color: #c00; background: #fff0f0; }
  .action-btn:active { background: var(--lavender-light); }
  .share-text { background: white; border: 2px solid var(--ink); padding: 14px; font-family: 'Caveat', cursive; font-size: 16px; line-height: 1.8; white-space: pre-wrap; color: var(--ink); min-height: 200px; }
  .copy-btn { width: 100%; background: var(--green); color: var(--ink); border: 2.5px solid var(--ink); border-radius: 0; padding: 14px; font-size: 18px; font-weight: 400; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 700; margin-top: 10px; letter-spacing: 0.1em; box-shadow: 3px 3px 0 var(--ink); transition: transform 0.08s, box-shadow 0.08s; }
  .copy-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .empty-state { text-align: center; padding: 60px 30px; }
  .empty-icon { font-size: 56px; margin-bottom: 16px; }
  .empty-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 26px; margin-bottom: 8px; letter-spacing: 0.06em; }

  .color-1 { background: var(--lavender); }

  .screenshot-drop-icon { font-size: 26px; margin-bottom: 5px; }
  .screenshot-drop-text { font-size: 11px; color: var(--ink); font-weight: 700; font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .screenshot-drop-sub { font-size: 10px; color: var(--muted); margin-top: 3px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; }

  .screenshot-read-btn:disabled { opacity: 0.5; }

  .screenshot-status.error { color: #c00; }
  .add-photo-btn { width: 100%; border: 2px dashed var(--ink); padding: 14px; background: var(--lavender-light); cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 11px; font-weight: 700; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; transition: background 0.1s; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display:none; min-height:100vh; background:var(--green); flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; max-width:430px; margin:0 auto;">
  <div style="font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:rgba(0,0,0,0.5); margin-bottom:4px;">MY FAVORITES</div>

<script type="module">
// ===== FIREBASE SETUP =====
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, writeBatch, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDe8IueGK7VrqFZSKQl8IQhoC4f-M5gx6E",
  authDomain: "my-recipe-book-5d143.firebaseapp.com",
  projectId: "my-recipe-book-5d143",
  storageBucket: "my-recipe-book-5d143.firebasestorage.app",
  messagingSenderId: "557330858090",
  appId: "1:557330858090:web:59666432ac70717d368a13"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// グローバルに公開（onclick属性から呼べるように）
window.googleLogin = async function() {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) {
    console.error(e);
    showToast('ログインに失敗しました');
  }
};

window.googleLogout = async function() {
  if (!confirm('ログアウトしますか？')) return;
  await signOut(auth);
};

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || '';
    document.getElementById('userAvatar').style.display = user.photoURL ? 'block' : 'none';
    document.getElementById('userName').textContent = user.displayName || user.email;
    await syncFromFirestore();
    renderTagFilter();
    renderList();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

// ===== FIRESTORE SYNC =====
async function syncFromFirestore() {
  if (!currentUser) return;
  try {
    const recipesRef = collection(db, 'users', currentUser.uid, 'recipes');
    const snapshot = await getDocs(recipesRef);
    const data = snapshot.docs.map(d => d.data());
    data.sort((a, b) => (a.order ?? 0) - (b.order ?? 0) || new Date(b.createdAt) - new Date(a.createdAt));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    const tagsRef = collection(db, 'users', currentUser.uid, 'meta');
    const tagsSnap = await getDocs(tagsRef);
    const tagsDoc = tagsSnap.docs.find(d => d.id === 'customTags');
    if (tagsDoc) localStorage.setItem(CUSTOM_TAGS_KEY, JSON.stringify(tagsDoc.data().tags || []));
  } catch(e) {
    console.error('sync error', e);
  }
}

async function saveRecipeToFirestore(recipe) {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, 'users', currentUser.uid, 'recipes', String(recipe.id)), recipe);
  } catch(e) { console.error(e); }
}

async function deleteRecipeFromFirestore(id) {
  if (!currentUser) return;
  try {
    await deleteDoc(doc(db, 'users', currentUser.uid, 'recipes', String(id)));
  } catch(e) { console.error(e); }
}

async function saveCustomTagsToFirestore(tags) {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, 'users', currentUser.uid, 'meta', 'customTags'), { tags });
  } catch(e) { console.error(e); }
}

// ===== DATA STORE =====
const STORAGE_KEY = 'recipe_book_v1';
const CUSTOM_TAGS_KEY = 'recipe_custom_tags';

function loadCustomTags() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_TAGS_KEY) || '[]'); }
  catch { return []; }
}
function saveCustomTags(tags) {
  localStorage.setItem(CUSTOM_TAGS_KEY, JSON.stringify(tags));
  saveCustomTagsToFirestore(tags);
}

function addCustomTag() {
  const name = prompt('新しいカテゴリ名を入力');
  if (!name || !name.trim()) return;
  const tags = loadCustomTags();
  const trimmed = name.trim();
  if (tags.includes(trimmed)) { showToast('すでにあるよ'); return; }
  tags.push(trimmed);
  saveCustomTags(tags);
  renderTagFilter();
}

function editCustomTag(tag) {
  const newName = prompt(`「${tag}」を編集`, tag);
  if (newName === null) return; // キャンセル
  const trimmed = newName.trim();
  const tags = loadCustomTags();
  if (!trimmed) {
    // 空なら削除確認
    if (!confirm(`「${tag}」を削除しますか？`)) return;
    saveCustomTags(tags.filter(t => t !== tag));
    // レシピのタグも更新
    const recipes = loadRecipes();
    recipes.forEach(r => { r.tags = (r.tags || []).filter(t => t !== tag); });
    saveRecipes(recipes);
    if (activeTag === tag) activeTag = 'すべて';
  } else {
    saveCustomTags(tags.map(t => t === tag ? trimmed : t));
    // レシピのタグも更新
    const recipes = loadRecipes();
    recipes.forEach(r => { r.tags = (r.tags || []).map(t => t === tag ? trimmed : t); });
    saveRecipes(recipes);
    if (activeTag === tag) activeTag = trimmed;
  }
  renderTagFilter();
  renderList();
}

// ===== RECIPE NAME INLINE EDIT =====
function editRecipeName(id) {
  const el = document.getElementById(`recipeName-${id}`);
  if (!el) return;
  const current = el.textContent;

  const input = document.createElement('input');
  input.value = current;
  input.style.cssText = `
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 26px;
    line-height: 1.05;
    letter-spacing: 0.04em;
    background: rgba(255,255,255,0.5);
    border: none;
    border-bottom: 2.5px solid var(--ink);
    outline: none;
    width: 100%;
    padding: 2px 0;
    color: var(--ink);
  `;
  el.replaceWith(input);
  input.focus();
  input.select();

  function save() {
    const newName = input.value.trim() || current;
    const recipes = loadRecipes();
    const recipe = recipes.find(r => r.id === id);
    if (recipe) {
      recipe.name = newName;
      recipe.updatedAt = new Date().toISOString();
      saveRecipes(recipes);
      saveRecipeToFirestore(recipe);
    }
    const div = document.createElement('div');
    div.id = `recipeName-${id}`;
    div.className = 'detail-name';
    div.textContent = newName;
    div.onclick = () => editRecipeName(id);
    div.title = 'タップして編集';
    div.style.cursor = 'text';
    input.replaceWith(div);
    renderList();
    showToast('レシピ名を更新しました');
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

// ===== RECIPE SOURCE INLINE EDIT =====
function editRecipeSource(id) {
  const container = document.getElementById(`recipeSourceDisplay-${id}`);
  const textEl = document.getElementById(`recipeSourceText-${id}`);
  if (!container) return;
  const recipes = loadRecipes();
  const recipe = recipes.find(r => r.id === id);
  const current = recipe ? (recipe.source || '') : '';

  const input = document.createElement('input');
  input.value = current;
  input.placeholder = 'https://... or メモ';
  input.style.cssText = `
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 11px;
    background: rgba(255,255,255,0.6);
    border: none;
    border-bottom: 2px solid var(--ink);
    outline: none;
    width: 100%;
    padding: 2px 0;
    color: var(--ink);
  `;
  textEl.replaceWith(input);
  container.style.cursor = 'default';
  input.focus();
  input.select();

  function save() {
    const newSource = input.value.trim();
    const rs = loadRecipes();
    const r = rs.find(r => r.id === id);
    if (r) {
      r.source = newSource;
      r.updatedAt = new Date().toISOString();
      saveRecipes(rs);
      saveRecipeToFirestore(r);
    }
    const span = document.createElement('span');
    span.id = `recipeSourceText-${id}`;
    span.style.color = newSource ? 'var(--green-dark)' : 'var(--muted)';
    span.textContent = newSource || 'URL・出典を追加...';
    input.replaceWith(span);
    container.style.cursor = 'text';
    renderList();
    if (newSource) showToast('出典を更新しました');
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = current; input.blur(); }
  });
}

function loadRecipes() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch { return []; }
}

function saveRecipes(recipes) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
  // Firestoreには個別保存（saveRecipe/deleteRecipeで行う）
}

// ===== STATE =====
let recipes = [];
let currentTags = [];
let activeTag = 'すべて';
let editingId = null;
let formTags = [];
let formPhoto = null;

// ===== RENDER LIST =====
function renderList() {
  recipes = loadRecipes();
  const q = document.getElementById('searchInput').value.toLowerCase();

  let filtered = recipes.filter(r => {
    const matchSearch = !q ||
      r.name.toLowerCase().includes(q) ||
      (r.tags && r.tags.some(t => t.includes(q))) ||
      (r.memo && r.memo.toLowerCase().includes(q)) ||
      (r.source && r.source.toLowerCase().includes(q));
    const matchTag = activeTag === 'すべて' || (r.tags && r.tags.includes(activeTag));
    return matchSearch && matchTag;
  });

  const countEl = document.getElementById('recipeCount');
  countEl.textContent = `${filtered.length} レシピ`;

  const listEl = document.getElementById('recipeList');

  if (filtered.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">レシピがまだないよ</div>
        <div class="empty-text">右上の ＋ ボタンから<br>最初のレシピを追加しよう</div>
      </div>
    `;
    return;
  }

  listEl.innerHTML = filtered.map(r => {
    const emoji = getEmoji(r.tags);
    const tagHtml = (r.tags || []).slice(0, 3).map((t, i) => `
      <span class="mini-tag tag-${i % 5}">${t}</span>
    `).join('');
    const date = new Date(r.createdAt).toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });

    return `

// ===== DRAG SORT =====
function initDragSort() {
  const list = document.getElementById('recipeList');
  let dragging = null;
  let touchStartY = 0;
  let touchCard = null;
  let placeholder = null;

  // --- Mouse drag ---
  list.querySelectorAll('.recipe-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragging = card;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      list.querySelectorAll('.recipe-card').forEach(c => c.classList.remove('drag-over'));
      dragging = null;
      saveOrder();
    });

    card.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragging || dragging === card) return;
      list.querySelectorAll('.recipe-card').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (e.clientY < mid) {
        list.insertBefore(dragging, card);
      } else {
        list.insertBefore(dragging, card.nextSibling);
      }
    });

    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => { e.preventDefault(); card.classList.remove('drag-over'); });

    // --- Touch drag ---
    const handle = card.querySelector('.drag-handle');
    if (!handle) return;

    handle.addEventListener('touchstart', e => {
      e.stopPropagation();
      touchCard = card;
      touchStartY = e.touches[0].clientY;
      card.classList.add('dragging');
      // placeholderを作成
      placeholder = document.createElement('div');
      placeholder.style.cssText = `height:${card.offsetHeight}px;border:2px dashed var(--green);margin:0;box-sizing:border-box;`;
      card.parentNode.insertBefore(placeholder, card.nextSibling);
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!touchCard) return;
      e.preventDefault();
      const touch = e.touches[0];
      const cards = [...list.querySelectorAll('.recipe-card:not(.dragging)')];
      let target = null;
      let insertBefore = true;
      for (const c of cards) {
        const rect = c.getBoundingClientRect();
        if (touch.clientY < rect.bottom) {
          target = c;
          insertBefore = touch.clientY < rect.top + rect.height / 2;
          break;
        }
      }
      if (target) {
        if (insertBefore) list.insertBefore(placeholder, target);
        else list.insertBefore(placeholder, target.nextSibling);
      } else {
        list.appendChild(placeholder);
      }
    }, { passive: false });

    handle.addEventListener('touchend', () => {
      if (!touchCard) return;
      touchCard.classList.remove('dragging');
      if (placeholder && placeholder.parentNode) {
        placeholder.parentNode.insertBefore(touchCard, placeholder);
        placeholder.remove();
      }
      placeholder = null;
      touchCard = null;
      saveOrder();
    });
  });

  function saveOrder() {
    const ids = [...list.querySelectorAll('.recipe-card')].map(c => Number(c.dataset.id));
    const all = loadRecipes();
    const reordered = ids.map(id => all.find(r => r.id === id)).filter(Boolean);
    // リストにないもの（フィルター中）は末尾に
    const rest = all.filter(r => !ids.includes(r.id));
    saveRecipes([...reordered, ...rest]);
    renderTagFilter();
  }
}

function getEmoji(tags) {
  if (!tags) return '🍳';
  if (tags.some(t => ['中華', '炒め物'].includes(t))) return '🥢';
  if (tags.some(t => ['スイーツ', 'お菓子', 'パンケーキ'].includes(t))) return '🍰';
  if (tags.some(t => ['サラダ'].includes(t))) return '🥗';
  if (tags.some(t => ['スープ', '鍋'].includes(t))) return '🍲';
  if (tags.some(t => ['朝食', 'パン'].includes(t))) return '🥞';
  if (tags.some(t => ['魚', '海鮮'].includes(t))) return '🐟';
  if (tags.some(t => ['お弁当'].includes(t))) return '🍱';
  return '🍳';
}

// ===== TAGS FILTER =====
function renderTagFilter() {
  recipes = loadRecipes();
  // レシピについてるタグ
  const recipeTags = [];
  recipes.forEach(r => (r.tags || []).forEach(t => { if (!recipeTags.includes(t)) recipeTags.push(t); }));
  // カスタム追加タグ（レシピにないものも表示）
  const customTags = loadCustomTags();
  const allTags = ['すべて', ...new Set([...recipeTags, ...customTags])];
  currentTags = allTags;

  const el = document.getElementById('tagFilter');

  const chipsHtml = allTags.map(t => {
    const editable = t !== 'すべて';
    return `<div class="tag-chip ${t === activeTag ? 'active' : ''}" data-tag="${t}" data-editable="${editable}">${t}</div>`;
  }).join('');

  el.innerHTML = chipsHtml + `<button class="tag-add-btn" onclick="addCustomTag()" title="カテゴリを追加">＋</button>`;

  el.querySelectorAll('.tag-chip').forEach(chip => {
    const tag = chip.dataset.tag;
    const editable = chip.dataset.editable === 'true';
    let clickTimer;
    let touchTimer;

    // タッチ長押し → 編集
    if (editable) {
      chip.addEventListener('touchstart', () => {
        touchTimer = setTimeout(() => editCustomTag(tag), 600);
      }, { passive: true });
      chip.addEventListener('touchend', () => clearTimeout(touchTimer));
      chip.addEventListener('touchmove', () => clearTimeout(touchTimer));
    }

    // PC: シングルクリック → 選択、ダブルクリック → 編集
    chip.addEventListener('click', () => {
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => setTag(tag), 200);
    });
    if (editable) {
      chip.addEventListener('dblclick', () => {
        clearTimeout(clickTimer);
        editCustomTag(tag);
      });
    }
  });
}

function setTag(tag) {
  activeTag = tag;
  renderTagFilter();
  renderList();
}

async function readScreenshot() {
  if (!screenshotBase64) return;

  const btn = document.getElementById('screenshotReadBtn');
  const status = document.getElementById('screenshotStatus');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 読み取り中...';
  status.textContent = '';
  status.className = 'screenshot-status';

  try {
    const base64Data = screenshotBase64.split(',')[1];
    const mediaType = screenshotBase64.split(';')[0].split(':')[1];

    const prompt = `この画像はレシピのスクリーンショットまたは写真です。
画像の中からレシピ情報を読み取り、以下のJSON形式で返してください（JSONのみ、説明不要）：

{
  "name": "レシピ名",
  "ingredients": [{"name": "材料名", "amount": "分量"}],
  "steps": "手順（番号付き、改行区切り）",
  "tags": ["タグ1", "タグ2"],
  "memo": "メモ・コツ（あれば）",
  "source": "出典（確認できれば）"
}

画像が手書きメモでも、インスタのスクショでも、レシピサイトの画像でも対応してください。
読み取れない項目は空文字にしてください。`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64Data }
            },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('読み取れませんでした');

    const recipe = JSON.parse(jsonMatch[0]);

    if (recipe.name) document.getElementById('recipeName').value = recipe.name;
    if (recipe.steps) document.getElementById('recipeSteps').value = recipe.steps;
    if (recipe.memo) document.getElementById('recipeMemo').value = recipe.memo;
    if (recipe.source) document.getElementById('recipeSource').value = recipe.source;

    if (recipe.ingredients && recipe.ingredients.length > 0) {
      document.getElementById('ingredientList').innerHTML = '';
      recipe.ingredients.forEach(i => addIngredient(i.name, i.amount));
    }

    if (recipe.tags && recipe.tags.length > 0) {
      formTags = [...new Set([...formTags, ...recipe.tags])];
      renderFormTags();
    }

    // スクショを料理写真としても使うか確認
    if (!formPhoto) {
      formPhoto = screenshotBase64;
      const photoPreview = document.getElementById('photoPreview');
      photoPreview.src = formPhoto;
      photoPreview.style.display = 'block';
    }

    status.textContent = '✓ 読み取り完了！内容を確認・修正してね';
    status.className = 'screenshot-status success';

  } catch (err) {
    status.textContent = '⚠ うまく読み取れなかった。手動で入力してね';
    status.className = 'screenshot-status error';
  }

  btn.disabled = false;
  btn.innerHTML = '<span>✨</span> AIにレシピを読み取ってもらう';
}

function quickAddPhoto(input, id) {

  if (!file) return;

  reader.onload = e => {
    const recipes = loadRecipes();
    const idx = recipes.findIndex(r => r.id === id);
    if (idx < 0) return;
    recipes[idx].photo = e.target.result;

    openDetail(id);
  };
  reader.readAsDataURL(file);
}

      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',

        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    // JSONを抽出
    const jsonMatch = text.match(/\{[\s\S]*\}/);

// ===== SAVE =====
function saveRecipe() {
  const name = document.getElementById('recipeName').value.trim();
  if (!name) {
    showToast('レシピ名を入力してね');
    document.getElementById('recipeName').focus();
    return;
  }

  const rows = document.querySelectorAll('#ingredientList .ingredient-row');
  const ingredients = Array.from(rows)
    .map(r => ({
      name: r.querySelector('.ingr-name').value.trim(),
      amount: r.querySelector('.ingr-amount').value.trim()
    }))
    .filter(i => i.name);

  const recipes = loadRecipes();

  if (editingId) {
    const idx = recipes.findIndex(r => r.id === editingId);
    if (idx >= 0) {
      recipes[idx] = {
        ...recipes[idx],
        name,
        ingredients,
        steps: document.getElementById('recipeSteps').value,
        tags: [...formTags],
        source: document.getElementById('recipeSource').value.trim(),
        memo: document.getElementById('recipeMemo').value.trim(),
        photo: formPhoto,
        updatedAt: new Date().toISOString()
      };
    }
  } else {
    recipes.unshift({
      id: Date.now(),
      name,
      ingredients,
      steps: document.getElementById('recipeSteps').value,
      tags: [...formTags],
      source: document.getElementById('recipeSource').value.trim(),
      memo: document.getElementById('recipeMemo').value.trim(),
      photo: formPhoto,
      createdAt: new Date().toISOString(),
      color: Math.floor(Math.random() * 5)
    });
  }

  saveRecipes(recipes);
  // Firestoreに保存
  const saved = editingId
    ? recipes.find(r => r.id === editingId)
    : recipes[0];
  if (saved) saveRecipeToFirestore(saved);
  renderTagFilter();
  renderList();
  showToast(editingId ? '更新したよ！' : '保存したよ！');
  closeDetailModal();
}

// ===== EDIT =====
function editRecipe(id) {
  const recipe = loadRecipes().find(r => r.id === id);
  if (!recipe) return;
  closeDetailModal();
  setTimeout(() => openAddModal(recipe), 200);
}

// ===== DELETE =====
function deleteRecipe(id) {
  if (!confirm('このレシピを削除しますか？')) return;
  const recipes = loadRecipes().filter(r => r.id !== id);
  saveRecipes(recipes);
  deleteRecipeFromFirestore(id);
  closeDetailModal();
  renderTagFilter();
  renderList();
  showToast('削除したよ');
}

// ===== SHARE =====
function shareRecipe(id) {
  const recipe = loadRecipes().find(r => r.id === id);
  if (!recipe) return;

  const ingr = (recipe.ingredients || []).map(i => `  ・${i.name}　${i.amount}`).join('\n');
  const steps = (recipe.steps || '').trim();
  const memo = recipe.memo ? `\n\n💬 コツ\n${recipe.memo}` : '';
  const source = recipe.source ? `\n\n📌 出典：${recipe.source}` : '';

  const text = `🍳 ${recipe.name}\n${'─'.repeat(20)}\n\n🥕 材料\n${ingr}\n\n👩‍🍳 作り方\n${steps}${memo}${source}`;

  document.getElementById('shareText').textContent = text;
  document.getElementById('shareModal').classList.add('open');
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('open');
}

function copyShare() {
  const text = document.getElementById('shareText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('コピーしたよ！');
    closeShareModal();
  });
}

// ===== TOAST =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== CLOSE ON OVERLAY CLICK =====
document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) closeAddModal();
});
document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('detailModal')) closeDetailModal();
});
document.getElementById('shareModal').addEventListener('click', e => {
  if (e.target === document.getElementById('shareModal')) closeShareModal();
});

// ===== INIT =====
// Firebase onAuthStateChanged で初期化するため、ここでは何もしない
</script>
</div><!-- /appScreen -->
</body>
</html>
